<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./logo_se.png" />
    <title>Blockly Template</title>
    <style>
      body { font-family: sans-serif; margin: 20px; }
      #blocklyDiv { height: 500px; width: 100%; }
      #evaluator { margin: 16px 0; padding: 12px; border: 1px solid #d7d7d7; border-radius: 8px; background: #fafafa; }
      #evaluator h3 { margin: 0 0 10px; }
      #evaluatorControls { display: grid; grid-template-columns: repeat(4, minmax(140px, 1fr)); gap: 10px; align-items: end; }
      #evaluator label { display: flex; flex-direction: column; gap: 6px; font-size: 14px; }
      #evaluator select { padding: 8px; font-size: 14px; }
      #evalResult { margin-top: 10px; font-family: monospace; font-weight: bold; }
      #codeOutput { background: #1e1e1e; color: #0f0; padding: 15px; font-family: monospace; white-space: pre-wrap;}
      #errorOutput { background: #ebebeb; color: red; padding: 15px; font-family: monospace; font-weight: bold; }

      @media (max-width: 900px) {
        #evaluatorControls { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <h2>Blockly Visual Language Template</h2>
    <div id="blocklyDiv"></div>
    <div id="evaluator">
      <h3>Evaluator</h3>
      <div id="evaluatorControls">
        <label>
          Policy
          <select id="policySelect"></select>
        </label>
        <label>
          Role
          <select id="roleSelect">
            <option value="TRUSTANDSAFETYLEAD">TrustandSafetyLead</option>
            <option value="MODERATOR">Moderator</option>
            <option value="USER">User</option>
          </select>
        </label>
        <label>
          Action
          <select id="actionSelect">
            <option value="BAN">Ban</option>
            <option value="FLAG">Flag</option>
            <option value="POST">Post</option>
          </select>
        </label>
        <label>
          Resource
          <select id="resourceSelect">
            <option value="USERACCOUNTS">UserAccounts</option>
            <option value="REPORTEDCONTENT">ReportedContent</option>
            <option value="PUBLICTIMELINE">PublicTimeline</option>
          </select>
        </label>
      </div>
      <div id="evalResult">Result: n/a</div>
    </div>
    <div id="codeOutput">Code will appear here...</div>
    <div id="errorOutput">Errors will appear here...</div>
    
    <!-- Load our TypeScript file -->
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
